<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Carregando...</title>
    <script type="text/javascript">
      // Captura o caminho que o usuário tentou acessar (/sobre, /contato, etc)
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Redireciona silenciosamente para o index.html passando a rota como parâmetro
      window.location.replace("/?p=" + path + search + hash);
    </script>
  </head>
  <body>
  </body>
</html>
