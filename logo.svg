<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="blueNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#0055ff" />
    </linearGradient>
    <linearGradient id="greenNeon" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#00b300" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="#0b0c10" rx="30" />

  <g transform="translate(200, 200)" filter="url(#neonGlow)">

    <ellipse cx="0" cy="0" rx="130" ry="45" fill="none" stroke="url(#blueNeon)" stroke-width="7" transform="rotate(45)" />
    <ellipse cx="0" cy="0" rx="130" ry="45" fill="none" stroke="url(#blueNeon)" stroke-width="7" transform="rotate(-45)" />

    <circle cx="92" cy="92" r="9" fill="#00ffff" />
    <circle cx="-92" cy="-92" r="9" fill="#00ffff" />
    <circle cx="92" cy="-92" r="9" fill="#00ffff" />
    <circle cx="-92" cy="92" r="9" fill="#00ffff" />

    <path d="M 0 55 C -45 10, -65 -45, 0 -100 C 65 -45, 45 10, 0 55 Z" fill="url(#greenNeon)" opacity="0.9" />
    
    <path d="M 0 -95 L 0 50" fill="none" stroke="#0b0c10" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 -20 Q 25 -45 30 -55" fill="none" stroke="#0b0c10" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 15 Q -25 -10 -30 -20" fill="none" stroke="#0b0c10" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 40 Q 20 20 25 10" fill="none" stroke="#0b0c10" stroke-width="3" stroke-linecap="round"/>

  </g>
</svg>
